<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>gamekeeper</title>
<style>
  :root{
    --bg:#FAFAF8; --panel:#fff; --ink:#1b1c1e; --muted:#6f7177; --faint:#a2a3a9;
    --line:#ededeb; --accent:#2f6b4f; --up:#2f6b4f; --warn:#b5862b; --bad:#b23b3b; --blue:#2f5d8a;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 var(--font);-webkit-font-smoothing:antialiased}
  header{display:flex;align-items:baseline;gap:14px;padding:20px 28px 14px;border-bottom:1px solid var(--line)}
  .word{font-size:21px;font-weight:680;letter-spacing:-.02em} .tag{color:var(--muted);font-size:13px}
  .metrics{margin-left:auto;display:flex;gap:24px}
  .metric b{font-size:18px;font-weight:680} .metric span{color:var(--faint);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-left:6px}
  .bar{display:flex;align-items:center;gap:9px;padding:13px 28px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  button{font:inherit;font-size:14px;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 14px;cursor:pointer}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button.solid{background:var(--accent);color:#fff;border-color:var(--accent)} button.solid:hover{filter:brightness(1.05)}
  .llm{margin-left:auto;color:var(--muted);font-size:12.5px;display:flex;align-items:center;gap:6px}
  .llm:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--up)}
  .wrap{display:grid;grid-template-columns:1fr 380px;gap:22px;padding:18px 28px 44px}
  @media(max-width:980px){.wrap{grid-template-columns:1fr}}
  h2{font-size:12px;font-weight:640;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin:16px 2px 11px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:12px}
  .dev{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:13px 14px;display:flex;gap:11px}
  .ico{font-size:20px;width:34px;height:34px;border-radius:8px;background:#f3f3f0;display:grid;place-items:center;flex:none}
  .body{min-width:0;flex:1}
  .nm{font-weight:620;font-size:15px;outline:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
  .nm:focus{box-shadow:inset 0 -2px 0 var(--accent)}
  .sub{color:var(--muted);font-size:12.5px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .addr{color:var(--faint);font:11px var(--mono);margin-top:4px}
  .pts{color:var(--accent);font:11px var(--mono);margin-top:4px}
  .pres{width:8px;height:8px;border-radius:50%;flex:none;margin-top:5px} .pres.up{background:var(--up)} .pres.away{border:1.5px solid #d4d4d0;background:transparent}
  .ctl{display:flex;gap:8px;margin-top:9px;opacity:.0;transition:.12s} .dev:hover .ctl{opacity:1}
  .ctl select,.ctl a{font-size:11.5px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:2px 7px;background:var(--panel);text-decoration:none}
  .ctl a:hover{color:var(--accent);border-color:var(--accent)}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:9px;margin-bottom:16px;overflow:hidden}
  .phead{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line)}
  .phead h3{margin:0;font-size:14.5px;font-weight:620} .phead .note{margin-left:auto;color:var(--faint);font-size:12px}
  .feed li{list-style:none;display:flex;gap:9px;padding:9px 14px;border-bottom:1px solid var(--line);font-size:13px} .feed li:last-child{border:0}
  ul{margin:0;padding:0}
  .k{font:600 10px/1.5 var(--mono);color:var(--faint);text-transform:uppercase;flex:none;width:58px}
  .k.up{color:var(--up)} .k.warn{color:var(--warn)} .k.bad{color:var(--bad)} .k.blue{color:var(--blue)}
  .ft{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis} .when{color:var(--faint);font-size:11px;margin-left:auto;flex:none}
  .exp{cursor:pointer} .exp em{font-style:normal;color:var(--faint);font-size:11px}
  .detail{display:none;white-space:pre-wrap;word-break:break-word;background:#f7f7f4;border:1px solid var(--line);border-radius:7px;margin:8px 14px;padding:9px 11px;font:11.5px/1.55 var(--mono);max-height:300px;overflow:auto}
  .detail.show{display:block} .detail .act{margin-top:8px}
  .verdict{font:600 11px var(--mono);padding:2px 7px;border-radius:5px} .verdict.clean{color:var(--up);background:#eef5f0} .verdict.suspicious{color:var(--warn);background:#f7f1e3} .verdict.malicious{color:var(--bad);background:#f7eaea}
  .ports{display:flex;flex-wrap:wrap;gap:5px;padding:11px 14px 5px}
  .port{font:600 11px var(--mono);color:var(--muted);background:#f3f3f0;border-radius:6px;padding:5px 7px} .port.on{color:var(--up);background:#eef5f0}
  .empty{color:var(--faint);font-size:13px;padding:14px}
  /* chat */
  .chat{max-height:300px;overflow:auto;padding:6px 0}
  .msg{padding:7px 14px;font-size:13.5px} .msg .who{font-weight:680;font-size:11px;color:var(--accent);margin-bottom:1px} .msg.you .who{color:var(--muted)}
  .msg .txt{white-space:pre-wrap;word-break:break-word}
  .cin{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line)}
  .cin input{flex:1;font:inherit;font-size:14px;border:1px solid var(--line);border-radius:8px;padding:8px 11px;outline:none}
  .cin input:focus{border-color:var(--accent)}
  footer{color:var(--faint);font-size:12px;text-align:center;padding:10px 28px 28px;border-top:1px solid var(--line)}
</style>
</head>
<body>
<header>
  <span class="word">gamekeeper</span><span class="tag">who's on your land</span>
  <div class="metrics" id="metrics"></div>
</header>
<div class="bar">
  <button class="solid" id="scan">Scan</button>
  <button id="active" title="nmap ping-sweep">Deep scan</button>
  <button id="autolabel" title="LLM names every device">Auto-label</button>
  <button id="cap" title="Wireshark packet capture">Capture 10s</button>
  <label style="display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px"><input type="checkbox" id="auto" checked> auto-refresh</label>
  <span class="llm" id="llm"></span>
</div>
<div class="wrap">
  <main>
    <h2>Devices</h2>
    <div class="grid" id="devices"></div>
  </main>
  <aside>
    <h2>Chat</h2>
    <div class="panel">
      <div class="phead"><h3>Ask gamekeeper</h3><span class="note" id="ircnote"></span></div>
      <div class="chat" id="chat"></div>
      <div class="cin"><input id="cmsg" placeholder="e.g. anything suspicious on my network?" autocomplete="off"><button class="solid" id="csend">Send</button></div>
    </div>
    <h2>Honeypot</h2>
    <div class="panel"><div class="phead"><h3>Decoy ports</h3><span class="note" id="hpnote"></span></div>
      <div class="ports" id="hpports"></div><ul class="feed" id="probes"></ul></div>
    <h2>Packet capture</h2>
    <div class="panel"><ul class="feed" id="captures"></ul></div>
    <h2>LLM activity</h2>
    <div class="panel"><ul class="feed" id="llmfeed"></ul></div>
    <h2>Activity</h2>
    <div class="panel"><ul class="feed" id="events"></ul></div>
  </aside>
</div>
<footer>Use only on networks you own or are authorised to monitor.</footer>

<script>
const ICON={phone:"📱",tablet:"📱",computer:"💻","apple-device":"💻",router:"📡","network-gear":"📡",printer:"🖨️",
  camera:"📷",nas:"🗄️",media:"📺","voice-assistant":"🔊",iot:"💡","smart-home":"💡",sbc:"🍓",server:"🖥️",unknown:"❔"};
const $=s=>document.querySelector(s),A=s=>[...document.querySelectorAll(s)];
function esc(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function rel(t){if(!t)return"";let d=(Date.now()-new Date(t).getTime())/1e3;return d<60?"now":d<3600?(d/60|0)+"m":d<86400?(d/3600|0)+"h":(d/86400|0)+"d"}
function kb(n){n=n||0;return n>1e6?(n/1048576).toFixed(1)+" MB":n>1e3?Math.round(n/1024)+" KB":n+" B"}
function vcls(a){a=(a||"").toLowerCase();return a.includes("malicious")?"malicious":a.includes("suspicious")?"suspicious":a.includes("clean")?"clean":""}
function ports(d){try{return JSON.parse(d.ports||"[]")}catch(e){return[]}}

async function load(){
  const s=await(await fetch("/api/state")).json(),c=s.counts;
  $("#metrics").innerHTML=[["present",c.present],["devices",c.total],["probes",c.probes],["bans",c.bans]].map(([k,v])=>`<span class="metric"><b>${v}</b><span>${k}</span></span>`).join("");
  if(s.llm){$("#llm").textContent=s.llm.detail}
  $("#devices").innerHTML=s.devices.length?s.devices.map(dev).join(""):`<div class="empty">No devices yet — tap Scan.</div>`;
  if(s.honeypot){$("#hpnote").textContent=s.honeypot.armed+" of "+s.honeypot.ports.length+" armed";
    $("#hpports").innerHTML=s.honeypot.ports.map(p=>`<span class="port ${p.listening?'on':''}">${p.port} ${esc(p.service)}</span>`).join("")}
  $("#probes").innerHTML=s.probes.length?s.probes.slice(0,25).map(p=>li("warn",p.service||"tcp",`${esc(p.src_ip)} → :${p.dst_port}`,p.ts)).join(""):`<li class="empty">No probes — the honeypot is waiting.</li>`;
  $("#captures").innerHTML=(s.captures&&s.captures.length)?s.captures.map(capRow).join(""):`<li class="empty">No captures — tap Capture for a Wireshark pcap.</li>`;
  $("#llmfeed").innerHTML=(s.llm_calls&&s.llm_calls.length)?s.llm_calls.map(llmRow).join(""):`<li class="empty">No LLM calls yet.</li>`;
  $("#events").innerHTML=s.events.length?s.events.slice(0,25).map(e=>li(sev(e.severity),e.kind,esc(e.detail||""),e.ts)).join(""):`<li class="empty">Quiet.</li>`;
  renderChat(s.messages||[]);
  if(s.chat&&s.chat.irc_available!==undefined)$("#ircnote").textContent=s.chat.irc_available?"saddlerFitter · IRC mode":"local model";
  bind();
}
function sev(x){return x==="bad"?"bad":x==="warn"?"warn":x==="notice"?"up":"blue"}
function dev(d){const t=d.dtype||"unknown",pl=ports(d);
  return `<div class="dev"><div class="ico">${ICON[t]||"❔"}</div><div class="body">
    <div class="nm" contenteditable data-mac="${d.mac}">${esc(d.label||d.hostname||d.ip||d.mac)}</div>
    <div class="sub">${esc(d.vendor||'Unknown vendor')}${d.randomized?' · private MAC':''}${d.os?' · '+esc(d.os):''}</div>
    <div class="addr">${esc(d.ip||'')} · ${esc(d.mac)} · ${rel(d.last_seen)}</div>
    ${pl.length?`<div class="pts">${pl.slice(0,8).map(p=>p.port+'/'+(p.service||p.proto||'')).join('  ')}</div>`:''}
    <div class="ctl"><select data-mac="${d.mac}" class="tsel">${["known","guest","unknown","blocked"].map(o=>`<option ${o==(d.trust||'unknown')?'selected':''}>${o}</option>`).join("")}</select>
      <a href="#" class="idf" data-ip="${esc(d.ip||'')}">Identify</a><a href="#" class="rep" data-mac="${d.mac}">Report</a></div>
    </div><span class="pres ${d.present?'up':'away'}"></span></div>`}
function li(cls,k,txt,ts){return `<li><span class="k ${cls}">${esc(k)}</span><span class="ft">${txt}</span><span class="when">${rel(ts)}</span></li>`}
function llmRow(e){return `<li class="exp" onclick="this.nextElementSibling.classList.toggle('show')"><span class="k blue">${esc(e.purpose||'llm')}</span><span class="ft">${esc((e.prompt||'').slice(0,42))}… <em>${esc(e.source)}</em></span><span class="when">${rel(e.ts)}</span></li><pre class="detail">PROMPT\n${esc(e.prompt||'')}\n\nRESPONSE\n${esc(e.response||'(none)')}</pre>`}
function capRow(e){const f=(e.pcap||'').split('/').pop(),v=vcls(e.analysis);
  return `<li class="exp" onclick="this.nextElementSibling.classList.toggle('show')"><span class="k up">pcap</span>
    <span class="ft">${esc(e.iface||'')} · <em>${kb(e.bytes)}</em>${v?` <span class="verdict ${v}">${v}</span>`:''}</span><span class="when">${rel(e.ts)}</span></li>
    <pre class="detail">${e.analysis?('ANALYSIS\n'+esc(e.analysis)+'\n\n'):''}${esc(e.summary||'(no summary)')}\nOpen: wireshark ${esc(e.pcap||'')}<div class="act"><button class="anz" data-pcap="${esc(e.pcap||'')}">${e.analysis?'Re-analyze':'Analyze with LLM'}</button></div></pre>`}
function renderChat(msgs){const box=$("#chat");const atBottom=box.scrollHeight-box.scrollTop-box.clientHeight<60;
  box.innerHTML=msgs.length?msgs.map(m=>`<div class="msg ${m.role==='user'?'you':''}"><div class="who">${esc(m.nick||m.role)}</div><div class="txt">${esc(m.text)}</div></div>`).join(""):`<div class="empty">Ask about your network, a device, or a capture.</div>`;
  if(atBottom)box.scrollTop=box.scrollHeight}

function bind(){
  A(".nm").forEach(el=>{el.onblur=()=>save(el.dataset.mac,{label:el.textContent.trim()});el.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();el.blur()}}});
  A(".tsel").forEach(el=>el.onchange=()=>save(el.dataset.mac,{trust:el.value}).then(load));
  A(".rep").forEach(el=>el.onclick=e=>{e.preventDefault();alert("Run:  gamekeeper report "+el.dataset.mac)});
  A(".idf").forEach(el=>el.onclick=e=>{e.preventDefault();if(el.dataset.ip){el.textContent="…";post("/api/identify",{ip:el.dataset.ip})}});
  A(".anz").forEach(el=>el.onclick=e=>{e.stopPropagation();el.textContent="analyzing…";post("/api/analyze",{pcap:el.dataset.pcap})});
}
const save=(mac,p)=>fetch("/api/label",{method:"POST",headers:H,body:JSON.stringify({mac,...p})});
const H={"Content-Type":"application/json"};
async function post(url,b,btn){if(btn){btn.dataset.o=btn.textContent;btn.textContent="…"}
  try{await fetch(url,{method:"POST",headers:H,body:JSON.stringify(b||{})})}finally{if(btn)btn.textContent=btn.dataset.o;load()}}
$("#scan").onclick=e=>post("/api/scan",{},e.target);
$("#active").onclick=e=>post("/api/scan",{active:true},e.target);
$("#autolabel").onclick=e=>post("/api/autolabel",{all:true},e.target);
$("#cap").onclick=e=>post("/api/capture",{seconds:10},e.target);
function send(){const t=$("#cmsg").value.trim();if(!t)return;$("#cmsg").value="";post("/api/chat",{text:t},$("#csend"))}
$("#csend").onclick=send; $("#cmsg").onkeydown=e=>{if(e.key==="Enter")send()};
setInterval(()=>{if($("#auto").checked)load()},15000);
load();
</script>
</body>
</html>
